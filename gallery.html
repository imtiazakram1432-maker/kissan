<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Kissan</title>

    <style>
        
        /* ===== Global Styles ===== */
        body {
            background-color: #228B22;
            font-family: 'Times New Roman', Times, serif;
            text-align: center;
            margin: 10px;
            padding: 10px;
            margin-top: auto;
        }

        /* ===== Main Heading ===== */
        h1 {
            font-size: 3.6rem;
            color: yellow;
            background-color: cadetblue;
            padding: 40px;
            margin: auto;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* ===== Section Titles ===== */
        h2 {
            font-size: 2.5rem;
            background-color: #8B4513;
            color: white;
            margin: 30px auto;
            padding: 10px;
            width: 40%;
            border-radius: 20px;
        }

        h3 {
            font-size: 2rem;
            background-color: aquamarine;
            color: black;
            width: 250px;
            margin: 20px auto;
            padding: 10px;
            border-radius: 30px;
        }

        /* ===== Picture Section ===== */
        .section {
            background-color: #7CFC00;
            border-radius: 20px;
            margin: 30px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .section img {
            margin: 10px;
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section img:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* ===== Video Section ===== */
        #video {
            background-color: #f5f5f5;
            border-radius: 20px;
            margin: 30px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        video {
            width: 300px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Kissan Family</h1>

    <!-- ===== Picture Section ===== -->
    <div class="section">
        <h2>PICTURES</h2>
        <img src="asset\18.jfif" alt="kissan">

        <img src="asset\26.jfif" alt="kissan">
        <img src="assset\21.jfif" alt="kissan">
        <img src="asset\22.jfif" alt="kissan">
        <img src="asset\23.jfif" alt="kissan">
        <img src="asset\24.jfif" alt="kissan">
        <img src="asset\25.jfif" alt="kissan">
    </div>

    <!-- ===== Video Section ===== -->
    <div id="video">

</body>
</html>
